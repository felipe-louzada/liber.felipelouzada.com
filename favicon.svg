<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background dark -->
  <rect width="64" height="64" fill="#0e0a04" rx="8"/>

  <!-- Outer octagon frame gold -->
  <polygon points="32,3 55,12 61,32 55,52 32,61 9,52 3,32 9,12"
    fill="none" stroke="#8b6914" stroke-width="2"/>
  <!-- Inner octagon frame bright gold -->
  <polygon points="32,7 51,15 57,32 51,49 32,57 13,49 7,32 13,15"
    fill="#1a120a" stroke="#d4a017" stroke-width="1"/>

  <!-- Corner gems -->
  <circle cx="32" cy="3"  r="2.5" fill="#8b1a0a"/>
  <circle cx="32" cy="61" r="2.5" fill="#8b1a0a"/>
  <circle cx="3"  cy="32" r="2.5" fill="#d4a017"/>
  <circle cx="61" cy="32" r="2.5" fill="#d4a017"/>

  <!-- Letter L in gothic style using path (stylized) -->
  <text
    x="32" y="46"
    text-anchor="middle"
    font-family="serif"
    font-size="34"
    font-weight="bold"
    fill="#d4a017"
    style="font-style: italic;"
  >L</text>

  <!-- Small decorative dots at mid-sides -->
  <circle cx="32" cy="8"  r="1" fill="#d4a017" opacity="0.6"/>
  <circle cx="32" cy="56" r="1" fill="#d4a017" opacity="0.6"/>
</svg>
